<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-запись - Салон красоты «Центрифуга»</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(145deg, #fdf5f0 0%, #fae8df 100%);
            color: #2e241f;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
        .form-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #b95f4a; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.4rem; }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e2d4cd;
            border-radius: 1.2rem;
            font-family: inherit;
        }
        .btn-primary {
            background: #b95f4a;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        .btn-primary:hover { background: #9e4a37; }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: center;
            display: none;
        }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .nav-menu a {
            text-decoration: none;
            color: #9e4a37;
            font-weight: 600;
        }
        max-width: 600px { .container { padding: 1rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-menu">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="about.html">О нас</a>
        <a href="reviews.html">Отзывы</a>
        <a href="contacts.html">Контакты</a>
    </div>
    <div class="form-card">
        <h1>📅 Онлайн-запись</h1>
        <form id="bookingForm">
            <div class="form-group">
                <label>Услуга</label>
                <select id="service" required>
                    <option value="">Выберите услугу</option>
                    <option>Окрашивание</option>
                    <option>Стрижка</option>
                    <option>Укладка</option>
                    <option>Маникюр</option>
                    <option>Макияж</option>
                    <option>Спа-процедуры</option>
                </select>
            </div>
            <div class="form-group">
                <label>Мастер</label>
                <select id="master" required>
                    <option value="">Выберите мастера</option>
                    <option>Анна Ковалева</option>
                    <option>Елена Волкова</option>
                    <option>Мария Соколова</option>
                </select>
            </div>
            <div class="form-group">
                <label>Дата</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>Время</label>
                <select id="time" required>
                    <option value="">Выберите время</option>
                    <option>10:00</option><option>11:00</option><option>12:00</option>
                    <option>13:00</option><option>14:00</option><option>15:00</option>
                    <option>16:00</option><option>17:00</option><option>18:00</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ваше ФИО</label>
                <input type="text" id="name" placeholder="Иванова Анна Петровна" required>
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" id="phone" placeholder="+7 900 123-45-67" required>
            </div>
            <div class="form-group">
                <label>Комментарий (необязательно)</label>
                <textarea id="comment" rows="2" placeholder="Пожелания, аллергии..."></textarea>
            </div>
            <button type="button" class="btn-primary" onclick="submitBooking()">Записаться</button>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    async function submitBooking() {
        const service = document.getElementById('service').value;
        const master = document.getElementById('master').value;
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const comment = document.getElementById('comment').value;

        if (!service || !master || !date || !time || !name || !phone) {
            showMessage("Заполните все обязательные поля", "error");
            return;
        }

        const bookedKey = `${master}_${date}_${time}`;
        if (localStorage.getItem(bookedKey)) {
            showMessage("Это время уже занято! Выберите другое", "error");
            return;
        }

        const bookingData = { service, master, date, time, name, phone, comment, timestamp: new Date().toISOString() };

        showMessage("Отправка...", "success");

        try {
            localStorage.setItem(bookedKey, name);
            document.getElementById('bookingForm').reset();
            showMessage("✅ Запись успешно создана! Мы свяжемся с вами.", "success");
            loadBookedSlots();
        } catch (error) {
            console.error("Ошибка:", error);
            showMessage("❌ Ошибка при отправке. Попробуйте позже.", "error");
        }
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        setTimeout(() => { msgDiv.className = 'message'; }, 5000);
    }

    function loadBookedSlots() {
        const booked = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.includes('_')) booked.push(key);
        }
        console.log("Занятые слоты:", booked);
    }

    function updateTimeOptions() {
        const master = document.getElementById('master').value;
        const date = document.getElementById('date').value;
        const timeSelect = document.getElementById('time');
        if (!master || !date) return;
        for (let option of timeSelect.options) {
            if (option.value) {
                const key = `${master}_${date}_${option.value}`;
                if (localStorage.getItem(key)) {
                    option.disabled = true;
                    option.style.color = "#999";
                } else {
                    option.disabled = false;
                    option.style.color = "#000";
                }
            }
        }
    }

    document.getElementById('master').addEventListener('change', updateTimeOptions);
    document.getElementById('date').addEventListener('change', updateTimeOptions);
    loadBookedSlots();
</script>
</body>
</html>
